spring:
  application:
    name: knowledge-svc
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  flyway:
    out-of-order: true
    baseline-on-migrate: true
    baseline-version: 8
  elasticsearch:
    uris: ${ELASTICSEARCH_URIS:http://localhost:9200}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    properties:
      schema.registry.url: ${SCHEMA_REGISTRY_URL:http://localhost:8086}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: io.confluent.kafka.serializers.KafkaAvroSerializer
      acks: all
      retries: 3
      properties:
        auto.register.schemas: true
        enable.idempotence: true
        retry.backoff.ms: 1000
    consumer:
      group-id: knowledge-search-indexer
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.synapse.knowledge.search.event"
        spring.json.value.default.type: "com.synapse.knowledge.search.event.NoteSearchSyncKafkaEvent"
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

server:
  port: 8082

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

synapse:
  jwt:
    public-key: ${JWT_PUBLIC_KEY:}
    issuer: ${JWT_ISSUER:synapse-auth}
  kafka:
    outbox:
      fixed-delay-ms: ${KAFKA_OUTBOX_FIXED_DELAY_MS:1000}
      batch-size: ${KAFKA_OUTBOX_BATCH_SIZE:50}

search:
  ai:
    base-url: ${SEARCH_AI_BASE_URL:http://localhost:8090}
    timeout: ${SEARCH_AI_TIMEOUT:3s}
    threshold: ${SEARCH_AI_THRESHOLD:0.7}
  hybrid:
    rrf-k: ${SEARCH_HYBRID_RRF_K:60}
    candidate-multiplier: ${SEARCH_HYBRID_CANDIDATE_MULTIPLIER:3}
  accuracy:
    dataset-version: ${SEARCH_ACCURACY_DATASET_VERSION:v1}
    benchmark-user-id: ${SEARCH_ACCURACY_BENCHMARK_USER_ID:910000}
    benchmark-tenant-id: ${SEARCH_ACCURACY_BENCHMARK_TENANT_ID:benchmark-search}
    semantic-actor-id: ${SEARCH_ACCURACY_SEMANTIC_ACTOR_ID:11111111-1111-1111-1111-111111111111}
    top-k: ${SEARCH_ACCURACY_TOP_K:10}
    indexing-wait-timeout: ${SEARCH_ACCURACY_INDEXING_WAIT_TIMEOUT:20s}

slack:
  webhook-url: ${SLACK_WEBHOOK_URL:}
  dlq-channel: "#synapse-dlq-alert"

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5p [%thread] %logger{36} - %msg%n"
