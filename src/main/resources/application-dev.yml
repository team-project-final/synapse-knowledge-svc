spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/synapse}
    username: ${DB_USERNAME:synapse}
    password: ${DB_PASSWORD:synapse_local_pw}
    driver-class-name: org.postgresql.Driver
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  elasticsearch:
    uris: ${ELASTICSEARCH_URIS:http://localhost:9200}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    properties:
      schema.registry.url: ${SCHEMA_REGISTRY_URL:http://localhost:8086}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

synapse:
  jwt:
    public-key: ${JWT_PUBLIC_KEY:}
    issuer: synapse-auth

search:
  ai:
    base-url: ${SEARCH_AI_BASE_URL:http://localhost:8090}
    timeout: ${SEARCH_AI_TIMEOUT:3s}
    threshold: ${SEARCH_AI_THRESHOLD:0.55}
  hybrid:
    rrf-k: ${SEARCH_HYBRID_RRF_K:40}
    candidate-multiplier: ${SEARCH_HYBRID_CANDIDATE_MULTIPLIER:5}
  accuracy:
    dataset-version: ${SEARCH_ACCURACY_DATASET_VERSION:v1}
    benchmark-user-id: ${SEARCH_ACCURACY_BENCHMARK_USER_ID:910000}
    benchmark-tenant-id: ${SEARCH_ACCURACY_BENCHMARK_TENANT_ID:benchmark-search}
    semantic-actor-id: ${SEARCH_ACCURACY_SEMANTIC_ACTOR_ID:11111111-1111-1111-1111-111111111111}
    top-k: ${SEARCH_ACCURACY_TOP_K:10}
    indexing-wait-timeout: ${SEARCH_ACCURACY_INDEXING_WAIT_TIMEOUT:20s}
  bm25:
    k1: ${SEARCH_BM25_K1:1.4}
    b: ${SEARCH_BM25_B:0.65}
    title-boost: ${SEARCH_BM25_TITLE_BOOST:4.0}
    content-boost: ${SEARCH_BM25_CONTENT_BOOST:1.0}
    tag-boost: ${SEARCH_BM25_TAG_BOOST:2.5}
    minimum-should-match: ${SEARCH_BM25_MINIMUM_SHOULD_MATCH:70%}

chunking:
  ai:
    enabled: ${CHUNKING_AI_ENABLED:true}
    base-url: ${CHUNKING_AI_BASE_URL:${SEARCH_AI_BASE_URL:http://localhost:8090}}
    timeout: ${CHUNKING_AI_TIMEOUT:3s}
    expected-dimensions: ${CHUNKING_AI_EXPECTED_DIMENSIONS:1536}

logging:
  level:
    com.synapse.knowledge: DEBUG
