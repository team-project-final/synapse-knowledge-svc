spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/synapse}
    username: ${DB_USERNAME:synapse}
    password: ${DB_PASSWORD:synapse_local_pw}
    driver-class-name: org.postgresql.Driver
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  elasticsearch:
    uris: ${ELASTICSEARCH_URIS:http://localhost:9200}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

synapse:
  jwt:
    public-key: ${JWT_PUBLIC_KEY:}
    issuer: synapse-auth

search:
  ai:
    base-url: ${SEARCH_AI_BASE_URL:http://localhost:8090}
    timeout: ${SEARCH_AI_TIMEOUT:3s}
    threshold: ${SEARCH_AI_THRESHOLD:0.7}
  hybrid:
    rrf-k: ${SEARCH_HYBRID_RRF_K:60}
    candidate-multiplier: ${SEARCH_HYBRID_CANDIDATE_MULTIPLIER:3}

logging:
  level:
    com.synapse.knowledge: DEBUG
