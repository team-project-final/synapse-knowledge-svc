spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver
  flyway:
    enabled: false
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
  kafka:
    bootstrap-servers: ${spring.embedded.kafka.brokers:localhost:9092}
    listener:
      auto-startup: false
    producer:
      # CI build 잡에는 Kafka 브로커가 없으므로, 발행 시도가 메타데이터 대기로
      # max.block.ms(기본 60s)만큼 블로킹되지 않도록 짧게 둬서 빠르게 실패하게 한다.
      properties:
        max.block.ms: 2000
    properties:
      schema.registry.url: mock://test-scope
  data:
    redis:
      host: localhost
      port: 6379

synapse:
  jwt:
    public-key: ${JWT_PUBLIC_KEY:}
    issuer: synapse-auth

search:
  ai:
    base-url: http://localhost:8090
    timeout: 3s
    threshold: 0.7
  hybrid:
    rrf-k: 60
    candidate-multiplier: 3
  accuracy:
    dataset-version: test-v1
    benchmark-user-id: 910000
    benchmark-tenant-id: benchmark-search
    semantic-actor-id: 11111111-1111-1111-1111-111111111111
    top-k: 10
    indexing-wait-timeout: 20s
