spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver
  flyway:
    enabled: false
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
  kafka:
    bootstrap-servers: ${spring.embedded.kafka.brokers:localhost:9092}
    listener:
      auto-startup: false
    properties:
      schema.registry.url: mock://test-scope
      producer:
        properties:
          max.block.ms: 5000
          request.timeout.ms: 5000
          delivery.timeout.ms: 10000
  data:
    redis:
      host: localhost
      port: 6379

synapse:
  jwt:
    public-key: ${JWT_PUBLIC_KEY:}
    issuer: synapse-auth
  kafka:
    enabled: true

search:
  ai:
    base-url: http://localhost:8090
    timeout: 3s
    threshold: 0.7
  hybrid:
    rrf-k: 60
    candidate-multiplier: 3
  accuracy:
    dataset-version: test-v1
    benchmark-user-id: 910000
    benchmark-tenant-id: benchmark-search
    semantic-actor-id: 11111111-1111-1111-1111-111111111111
    top-k: 10
    indexing-wait-timeout: 20s
